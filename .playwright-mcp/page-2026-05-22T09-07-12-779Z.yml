      - heading "Pricing FAQ" [level=2] [ref=e411]
      - generic [ref=e412]:
        - article [ref=e413]:
          - heading "How does Prymal pricing work?" [level=3] [ref=e414]
          - paragraph [ref=e415]: Prymal pricing is structured around workspace plans, execution capacity, and the depth of business memory, workflows, and collaboration controls your team needs.
        - article [ref=e416]:
          - heading "What is Founding Access?" [level=3] [ref=e417]
          - paragraph [ref=e418]: Founding Access is Prymal’s early-adopter offer for teams joining before wider launch. It is intended for serious operators who want early leverage and direct product feedback loops.
        - article [ref=e419]:
          - heading "Can teams use Prymal together?" [level=3] [ref=e420]
          - paragraph [ref=e421]: Yes. Prymal is built for shared business context, team workflows, operator oversight, and repeatable execution rather than single-user prompt sessions.
        - article [ref=e422]:
          - heading "Can Prymal generate images or videos?" [level=3] [ref=e423]
          - paragraph [ref=e424]: Yes. Prymal supports guided media generation inside the workspace so teams can produce campaign visuals and video outputs without exposing routing internals on the surface.
