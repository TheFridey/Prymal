    - region "Start simple. Scale when you need." [ref=e371]:
      - img [ref=e373]
      - generic [ref=e377]:
        - heading "Start simple. Scale when you need." [level=2] [ref=e378]
        - paragraph [ref=e379]: You do not need to understand the whole system on day one. Start with a single task, then grow into repeatable workflows as your team finds the processes worth automating.
    - region "Questions" [ref=e380]:
      - heading "Questions" [level=2] [ref=e381]
      - generic [ref=e382]:
        - heading "How do credits work?" [level=3] [ref=e383]
        - paragraph [ref=e384]: "Credits are used when you run execution work: chat, agents, workflows, retrieval-heavy tasks, and guided image generation draw from your execution balance. Most short runs use about 1-3 credits; larger workflows with more context use more. AI video credits are separate and only power AI-generated video renders."
      - generic [ref=e385]:
        - heading "What happens if I run out?" [level=3] [ref=e386]
        - paragraph [ref=e387]: New runs that need credits pause until your next reset or until you add capacity. We show usage in real time in your workspace so you are never surprised.
      - generic [ref=e388]:
        - heading "Can I buy more?" [level=3] [ref=e389]
        - paragraph [ref=e390]: Yes. Credit packs are available as a top-up if you need a short boost. For steady growth, upgrading your plan is usually better value.
      - generic [ref=e391]:
        - heading "Do credits roll over?" [level=3] [ref=e392]
        - paragraph [ref=e393]: Included monthly credits refresh on your billing cycle and do not roll over. Purchased top-up credits follow the terms shown at checkout and in your billing portal.
      - generic [ref=e394]:
        - heading "Is pricing predictable?" [level=3] [ref=e395]
        - paragraph [ref=e396]: Your subscription price is fixed in GBP. Usage stays within the included execution credits and AI video credits for your tier, with clear limits for concurrent runs and daily video caps on higher plans.
      - generic [ref=e397]:
        - heading "Fair usage" [level=3] [ref=e398]
        - paragraph [ref=e399]: Prymal includes generous monthly usage allowances. Heavy media generation, deep memory retrieval, bulk workflows, and premium model usage are subject to fair-use controls and may require usage packs.
      - generic [ref=e400]:
        - heading "Are there usage limits?" [level=3] [ref=e401]
        - paragraph [ref=e402]: Yes. Every tier has clear execution and AI video allowances, plus fair-use controls for costly workloads. Usage packs refill capacity for short bursts — they do not remove limits.
      - generic [ref=e403]:
        - heading "What media can I generate?" [level=3] [ref=e404]
        - paragraph [ref=e405]: The guided image builder uses execution credits. The guided video builder supports Fast Draft and Cinematic one-shot renders at 4, 6, or 8 seconds; video reference images currently require the Cinematic lane at 8 seconds.
    - region "Start using Prymal today" [ref=e406]:
      - heading "Start using Prymal today" [level=2] [ref=e407]
      - paragraph [ref=e408]: No jargon, no surprise mechanics — just clear plans and live usage in your workspace.
    - generic [ref=e409]:
