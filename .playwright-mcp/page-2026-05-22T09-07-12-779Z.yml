    - region "How credits work" [ref=e259]:
      - generic [ref=e260]:
        - heading "How credits work" [level=3] [ref=e261]
        - paragraph [ref=e262]:
          - strong [ref=e263]: Credits are used when you run execution work.
          - text: A quick reply might be one credit; a deep multi-step workflow uses more. Guided image generation also uses execution credits. Most everyday tasks fall in the 1–3 credit range; larger automations scale up from there.
        - paragraph [ref=e264]:
          - strong [ref=e265]: AI video credits power video renders only.
          - text: They are separate from execution credits so you always know what kind of work you are funding.
      - generic [ref=e266]:
        - heading "Simple, predictable billing" [level=3] [ref=e267]
        - paragraph [ref=e268]: Your plan price is fixed. Included execution credits and AI video credits reset each billing cycle. You can see remaining balances in the app, get early warnings as you approach limits, and add top-ups only if you need them.
