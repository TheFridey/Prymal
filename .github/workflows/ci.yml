name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_vps:
        description: Run VPS deployment after CI passes
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_TEST || 'pk_test_placeholder' }}
  VITE_API_URL: http://localhost:3001/api

jobs:
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/prymal
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: prymal
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d prymal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Load Prymal schema
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres -d prymal; do
            sleep 1
          done

          if ! psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f ../database/schema.sql; then
            psql "$DATABASE_URL" -c "\dx" || true
            psql "$DATABASE_URL" -c "\dt" || true
            exit 1
          fi
      - run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Lint frontend
        run: cd frontend && npm run lint
      - name: Install backend deps
        run: cd backend && npm ci
      - name: Lint backend
        run: cd backend && npm run lint

  frontend-verify-build:
    name: Frontend verify-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm run verify-build -- --clean
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ env.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ env.VITE_API_URL }}

  frontend-performance:
    name: Frontend performance budget
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ env.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ env.VITE_API_URL }}
      - run: npm run perf:budget

  e2e-marketing:
    name: E2E marketing smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e:public -- tests/marketing-smoke.spec.js tests/onboarding-smoke.spec.js
        env:
          CI: true
          VITE_CLERK_PUBLISHABLE_KEY: ${{ env.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ env.VITE_API_URL }}

  e2e-authenticated-preflight:
    name: E2E authenticated preflight
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.auth-preflight.outputs.mode }}
    steps:
      - id: auth-preflight
        name: Check authenticated E2E secret availability
        shell: bash
        env:
          PLAYWRIGHT_STAGING_URL: ${{ secrets.PLAYWRIGHT_STAGING_URL || '' }}
          PLAYWRIGHT_TEST_USER_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_USER_EMAIL || '' }}
          PLAYWRIGHT_TEST_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_USER_PASSWORD || '' }}
          PLAYWRIGHT_TEST_STAFF_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_STAFF_EMAIL || '' }}
          PLAYWRIGHT_TEST_STAFF_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_STAFF_PASSWORD || '' }}
        run: |
          required_vars=(
            PLAYWRIGHT_STAGING_URL
            PLAYWRIGHT_TEST_USER_EMAIL
            PLAYWRIGHT_TEST_USER_PASSWORD
            PLAYWRIGHT_TEST_STAFF_EMAIL
            PLAYWRIGHT_TEST_STAFF_PASSWORD
          )

          missing=()
          for key in "${required_vars[@]}"; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "mode=run" >> "$GITHUB_OUTPUT"
            echo "Authenticated Playwright secrets are present." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "mode=skipped" >> "$GITHUB_OUTPUT"
          {
            echo "Authenticated Playwright regression was not executed because the required secrets are unavailable for this run."
            echo ""
            echo "Event: ${{ github.event_name }}"
            echo "Missing variables:"
            for key in "${missing[@]}"; do
              echo "- $key"
            done
          } >> "$GITHUB_STEP_SUMMARY"

  e2e-authenticated:
    name: E2E authenticated regression
    runs-on: ubuntu-latest
    needs: e2e-authenticated-preflight
    if: needs.e2e-authenticated-preflight.outputs.mode == 'run'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx playwright install chromium --with-deps
      - name: Run authenticated E2E
        env:
          CI: true
          PLAYWRIGHT_TEST_USER_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_USER_EMAIL }}
          PLAYWRIGHT_TEST_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_USER_PASSWORD }}
          PLAYWRIGHT_TEST_STAFF_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_STAFF_EMAIL }}
          PLAYWRIGHT_TEST_STAFF_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_STAFF_PASSWORD }}
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_STAGING_URL }}
          PLAYWRIGHT_ALLOW_REMOTE_AUTH_URLS: 'true'
        run: cd frontend && npx playwright test --project=authenticated
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-authenticated-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  sdk-lint:
    name: SDK TypeScript lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - run: npm ci
      - run: npm run lint

  deploy-preflight:
    name: Deploy preflight
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.deploy-preflight.outputs.mode }}
    steps:
      - id: deploy-preflight
        name: Check VPS deployment configuration
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || '' }}
          VPS_USER: ${{ secrets.VPS_USER || '' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY || '' }}
        run: |
          required_vars=(
            VPS_HOST
            VPS_USER
            VPS_SSH_KEY
          )

          missing=()
          for key in "${required_vars[@]}"; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          event_name="${{ github.event_name }}"
          ref_name="${{ github.ref_name }}"
          deploy_input="${{ inputs.deploy_vps && 'true' || 'false' }}"
          if [ "$event_name" = "pull_request" ]; then
            echo "mode=skipped" >> "$GITHUB_OUTPUT"
            {
              echo "VPS deployment is disabled for pull request workflows."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$ref_name" != "master" ]; then
            echo "mode=skipped" >> "$GITHUB_OUTPUT"
            {
              echo "VPS deployment is only eligible from the \`master\` branch."
              echo ""
              echo "Current branch: \`$ref_name\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$event_name" = "workflow_dispatch" ]; then
            if [ "$deploy_input" != "true" ]; then
              echo "mode=skipped" >> "$GITHUB_OUTPUT"
              {
                echo "Manual workflow run completed without requesting VPS deployment."
                echo ""
                echo "Set \`deploy_vps=true\` in \`workflow_dispatch\` to run deployment."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            if [ "${#missing[@]}" -gt 0 ]; then
              {
                echo "Manual VPS deployment was explicitly requested, but required secrets are missing."
                echo ""
                echo "Missing variables:"
                for key in "${missing[@]}"; do
                  echo "- $key"
                done
              } >> "$GITHUB_STEP_SUMMARY"
              echo "Missing required VPS deployment secrets: ${missing[*]}" >&2
              exit 1
            fi

            echo "mode=run" >> "$GITHUB_OUTPUT"
            {
              echo "Manual VPS deployment was requested and all required secrets are present."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$event_name" != "workflow_dispatch" ]; then
            echo "mode=skipped" >> "$GITHUB_OUTPUT"
            {
              echo "VPS deployment is manual-only and is not configured for this event."
              echo ""
              echo "Current event: \`$event_name\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

  deploy-vps:
    name: Deploy to VPS
    needs:
      - backend-lint
      - backend-test
      - lint
      - frontend-lint
      - frontend-verify-build
      - frontend-performance
      - e2e-marketing
      - e2e-authenticated-preflight
      - e2e-authenticated
      - sdk-lint
      - deploy-preflight
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.deploy-preflight.outputs.mode == 'run' &&
      needs.backend-lint.result == 'success' &&
      needs.backend-test.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.frontend-lint.result == 'success' &&
      needs.frontend-verify-build.result == 'success' &&
      needs.frontend-performance.result == 'success' &&
      needs.e2e-marketing.result == 'success' &&
      needs.e2e-authenticated-preflight.result == 'success' &&
      (needs.e2e-authenticated.result == 'success' || needs.e2e-authenticated.result == 'skipped') &&
      needs.sdk-lint.result == 'success'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Tag Sentry release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT || 'prymal' }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_ORG" ]; then
            echo "Skipping Sentry release tagging because SENTRY_AUTH_TOKEN or SENTRY_ORG is not configured."
            exit 0
          fi

          npx @sentry/cli releases new ${{ github.sha }}
          npx @sentry/cli releases set-commits ${{ github.sha }} --auto
          npx @sentry/cli releases finalize ${{ github.sha }}
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script:   bash /home/deploy/prymal/scripts/deploy.sh
