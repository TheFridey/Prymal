name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_TEST || 'pk_test_placeholder' }}
  VITE_API_URL: http://localhost:3001/api

jobs:
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/prymal
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: prymal
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d prymal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Load Prymal schema
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres -d prymal; do
            sleep 1
          done

          if ! psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f ../database/schema.sql; then
            psql "$DATABASE_URL" -c "\dx" || true
            psql "$DATABASE_URL" -c "\dt" || true
            exit 1
          fi
      - run: npm test

  frontend-verify-build:
    name: Frontend verify-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm run verify-build -- --clean
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ env.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ env.VITE_API_URL }}

  frontend-performance:
    name: Frontend performance budget
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ env.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ env.VITE_API_URL }}
      - run: npm run perf:budget

  e2e-marketing:
    name: E2E marketing smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e:public -- tests/marketing-smoke.spec.js tests/onboarding-smoke.spec.js
        env:
          CI: true
          VITE_CLERK_PUBLISHABLE_KEY: ${{ env.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ env.VITE_API_URL }}

  e2e-authenticated-preflight:
    name: E2E authenticated preflight
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.auth-preflight.outputs.mode }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - id: auth-preflight
        name: Check authenticated E2E secret availability
        shell: bash
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_API_URL: ${{ secrets.PLAYWRIGHT_API_URL || '' }}
          PLAYWRIGHT_TEST_USER_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_USER_EMAIL || '' }}
          PLAYWRIGHT_TEST_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_USER_PASSWORD || '' }}
          PLAYWRIGHT_TEST_STAFF_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_STAFF_EMAIL || '' }}
          PLAYWRIGHT_TEST_STAFF_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_STAFF_PASSWORD || '' }}
          PLAYWRIGHT_TEST_INVITEE_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_INVITEE_EMAIL || '' }}
          PLAYWRIGHT_TEST_INVITEE_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_INVITEE_PASSWORD || '' }}
          PLAYWRIGHT_TEST_ONBOARDING_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_ONBOARDING_EMAIL || '' }}
          PLAYWRIGHT_TEST_ONBOARDING_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_ONBOARDING_PASSWORD || '' }}
          PLAYWRIGHT_TEST_BILLING_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_BILLING_EMAIL || '' }}
          PLAYWRIGHT_TEST_BILLING_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_BILLING_PASSWORD || '' }}
        run: |
          required_vars=(
            PLAYWRIGHT_BASE_URL
            PLAYWRIGHT_API_URL
            PLAYWRIGHT_TEST_USER_EMAIL
            PLAYWRIGHT_TEST_USER_PASSWORD
            PLAYWRIGHT_TEST_STAFF_EMAIL
            PLAYWRIGHT_TEST_STAFF_PASSWORD
            PLAYWRIGHT_TEST_INVITEE_EMAIL
            PLAYWRIGHT_TEST_INVITEE_PASSWORD
            PLAYWRIGHT_TEST_ONBOARDING_EMAIL
            PLAYWRIGHT_TEST_ONBOARDING_PASSWORD
            PLAYWRIGHT_TEST_BILLING_EMAIL
            PLAYWRIGHT_TEST_BILLING_PASSWORD
          )

          missing=()
          for key in "${required_vars[@]}"; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "mode=run" >> "$GITHUB_OUTPUT"
            echo "Authenticated Playwright secrets are present." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "mode=skipped" >> "$GITHUB_OUTPUT"
          {
            echo "Authenticated Playwright regression was not executed because the required secrets are unavailable for this run."
            echo ""
            echo "Event: ${{ github.event_name }}"
            echo "Missing variables:"
            for key in "${missing[@]}"; do
              echo "- $key"
            done
          } >> "$GITHUB_STEP_SUMMARY"

  e2e-authenticated:
    name: E2E authenticated regression
    runs-on: ubuntu-latest
    needs: e2e-authenticated-preflight
    if: needs.e2e-authenticated-preflight.outputs.mode == 'run'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: node ../backend/scripts/validate-playwright-secrets.mjs
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_API_URL: ${{ secrets.PLAYWRIGHT_API_URL || '' }}
          PLAYWRIGHT_TEST_USER_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_USER_EMAIL || '' }}
          PLAYWRIGHT_TEST_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_USER_PASSWORD || '' }}
          PLAYWRIGHT_TEST_STAFF_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_STAFF_EMAIL || '' }}
          PLAYWRIGHT_TEST_STAFF_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_STAFF_PASSWORD || '' }}
          PLAYWRIGHT_TEST_INVITEE_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_INVITEE_EMAIL || '' }}
          PLAYWRIGHT_TEST_INVITEE_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_INVITEE_PASSWORD || '' }}
          PLAYWRIGHT_TEST_ONBOARDING_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_ONBOARDING_EMAIL || '' }}
          PLAYWRIGHT_TEST_ONBOARDING_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_ONBOARDING_PASSWORD || '' }}
          PLAYWRIGHT_TEST_BILLING_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_BILLING_EMAIL || '' }}
          PLAYWRIGHT_TEST_BILLING_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_BILLING_PASSWORD || '' }}
      - run: node ../backend/scripts/validate-env.mjs --scope playwright --mode staging
        env:
          PLAYWRIGHT_AUTH_REQUIRED: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_API_URL: ${{ secrets.PLAYWRIGHT_API_URL || '' }}
          PLAYWRIGHT_TEST_USER_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_USER_EMAIL || '' }}
          PLAYWRIGHT_TEST_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_USER_PASSWORD || '' }}
          PLAYWRIGHT_TEST_STAFF_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_STAFF_EMAIL || '' }}
          PLAYWRIGHT_TEST_STAFF_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_STAFF_PASSWORD || '' }}
          PLAYWRIGHT_TEST_INVITEE_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_INVITEE_EMAIL || '' }}
          PLAYWRIGHT_TEST_INVITEE_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_INVITEE_PASSWORD || '' }}
          PLAYWRIGHT_TEST_ONBOARDING_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_ONBOARDING_EMAIL || '' }}
          PLAYWRIGHT_TEST_ONBOARDING_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_ONBOARDING_PASSWORD || '' }}
          PLAYWRIGHT_TEST_BILLING_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_BILLING_EMAIL || '' }}
          PLAYWRIGHT_TEST_BILLING_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_BILLING_PASSWORD || '' }}
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e:auth -- tests/authenticated-regression.spec.js tests/onboarding-regression.spec.js tests/invite-membership.spec.js tests/billing-portal.spec.js tests/admin-operator.spec.js tests/security-boundaries.spec.js
        env:
          CI: true
          VITE_CLERK_PUBLISHABLE_KEY: ${{ env.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ env.VITE_API_URL }}
          PLAYWRIGHT_AUTH_REQUIRED: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_API_URL: ${{ secrets.PLAYWRIGHT_API_URL || '' }}
          PLAYWRIGHT_TEST_USER_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_USER_EMAIL || '' }}
          PLAYWRIGHT_TEST_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_USER_PASSWORD || '' }}
          PLAYWRIGHT_TEST_STAFF_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_STAFF_EMAIL || '' }}
          PLAYWRIGHT_TEST_STAFF_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_STAFF_PASSWORD || '' }}
          PLAYWRIGHT_TEST_INVITEE_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_INVITEE_EMAIL || '' }}
          PLAYWRIGHT_TEST_INVITEE_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_INVITEE_PASSWORD || '' }}
          PLAYWRIGHT_TEST_ONBOARDING_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_ONBOARDING_EMAIL || '' }}
          PLAYWRIGHT_TEST_ONBOARDING_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_ONBOARDING_PASSWORD || '' }}
          PLAYWRIGHT_TEST_BILLING_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_BILLING_EMAIL || '' }}
          PLAYWRIGHT_TEST_BILLING_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_BILLING_PASSWORD || '' }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-authenticated-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  sdk-lint:
    name: SDK TypeScript lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - run: npm ci
      - run: npm run lint

  deploy-vps:
    name: Deploy to VPS
    needs:
      - backend-test
      - frontend-verify-build
      - frontend-performance
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script:   bash /home/deploy/prymal/scripts/deploy.sh
