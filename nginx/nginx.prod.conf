events { worker_connections 1024; }
http {
  upstream api { server prymal-api:3001; }
  upstream frontend { server prymal-frontend:80; }

  server {
    listen 80;
    server_name prymal.io www.prymal.io;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name prymal.io www.prymal.io;

    ssl_certificate /etc/letsencrypt/live/prymal.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prymal.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # API — disable buffering for SSE streaming
    location /api/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection '';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
      chunked_transfer_encoding on;
    }

    # Clerk webhooks — same proxy, no buffering
    location /api/webhooks/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_buffering off;
    }

    # Frontend static files
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
