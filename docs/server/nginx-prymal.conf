server {
    listen 80;
    listen [::]:80;
    server_name api.prymal.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.prymal.io;

    # Cloudflare should remain in Full (strict) mode so the origin certificate is verified.
    ssl_certificate     /etc/letsencrypt/live/api.prymal.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prymal.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 16m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        # Required for SSE: agent responses, SENTINEL events, and streaming traces.
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
