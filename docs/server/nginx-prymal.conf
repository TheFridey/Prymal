server {
    server_name api.prymal.io;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Required for SSE: agent responses, SENTINEL events, TTS audio_response chunks
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/api.prymal.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prymal.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
}

server {
    listen 80;
    server_name api.prymal.io;
    return 301 https://$host$request_uri;
}
