<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found | Prymal</title>
    <meta name="description" content="The Prymal page you requested could not be found." />
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://prymal.io/" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080b12;
        color: #f5f7fb;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(76, 201, 240, 0.18), transparent 32rem),
          radial-gradient(circle at 80% 20%, rgba(124, 255, 224, 0.12), transparent 28rem),
          #080b12;
      }

      main {
        width: min(34rem, calc(100vw - 2rem));
      }

      .eyebrow {
        color: #7cffe0;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0.75rem 0;
        font-size: clamp(2.25rem, 7vw, 4.5rem);
        line-height: 0.95;
      }

      p {
        margin: 0 0 1.5rem;
        color: #aeb8ca;
        font-size: 1rem;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 2.75rem;
        padding: 0 1rem;
        border: 1px solid rgba(124, 255, 224, 0.42);
        border-radius: 8px;
        color: #081016;
        background: #7cffe0;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">404</div>
      <h1>Page not found.</h1>
      <p>This URL is not part of the public Prymal site. Head back to the canonical homepage.</p>
      <a href="/">Open Prymal home</a>
    </main>
  </body>
</html>
