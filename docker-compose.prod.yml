services:
  prymal-db:
    image: pgvector/pgvector:pg16
    container_name: prymal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: prymal
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - prymal_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d prymal"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [prymal-net]

  prymal-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prymal-api
    restart: unless-stopped
    env_file: ./backend/.env.prod
    depends_on:
      prymal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [prymal-net]

  prymal-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_API_URL: ${VITE_API_URL}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
    container_name: prymal-frontend
    restart: unless-stopped
    networks: [prymal-net]

  prymal-proxy:
    image: nginx:alpine
    container_name: prymal-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on: [prymal-api, prymal-frontend]
    networks: [prymal-net]

volumes:
  prymal_postgres_data:

networks:
  prymal-net:
    driver: bridge
